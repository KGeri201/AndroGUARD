<!DOCTYPE html>
<html>
<head>
    <title>Sensor Measurements</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <h1>Sensor Measurements</h1>
    <div id="output">
        <h2>Accelerometer</h2>
        <p>X: <span id="accelX">0</span></p>
        <p>Y: <span id="accelY">0</span></p>
        <p>Z: <span id="accelZ">0</span></p>
        <h2>Gyroscope</h2>
        <p>Alpha (Rotation around Z axis): <span id="gyroAlpha">0</span></p>
        <p>Beta (Rotation around X axis): <span id="gyroBeta">0</span></p>
        <p>Gamma (Rotation around Y axis): <span id="gyroGamma">0</span></p>
        <button id="startRecording">Start Recording</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
